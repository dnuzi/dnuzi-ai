<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dnuzi AI — Browser SDK Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #app { width: 100%; max-width: 700px; padding: 24px; display: flex; flex-direction: column; height: 100vh; }
    header { text-align: center; padding: 20px 0 12px; }
    header h1 { font-size: 2rem; background: linear-gradient(135deg, #00d2ff, #a044ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { color: #888; font-size: .9rem; margin-top: 4px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.55; font-size: .95rem; word-break: break-word; }
    .msg.user { align-self: flex-end; background: linear-gradient(135deg, #2d1b69, #4a00c8); color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai   { align-self: flex-start; background: #1a1a2e; border: 1px solid #2a2a4a; color: #d0d0f0; border-bottom-left-radius: 4px; }
    .msg .meta { font-size: .72rem; color: #666; margin-top: 6px; }
    .msg.ai .meta { color: #a044ff; }
    #input-row { display: flex; gap: 10px; padding: 16px 0 8px; }
    #input-row input { flex: 1; background: #1a1a2e; border: 1px solid #2a2a4a; color: #e0e0f0; padding: 12px 16px; border-radius: 12px; font-size: 1rem; outline: none; transition: border .2s; }
    #input-row input:focus { border-color: #a044ff; }
    #input-row button { background: linear-gradient(135deg, #00d2ff, #a044ff); border: none; color: #fff; padding: 12px 22px; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: opacity .2s; }
    #input-row button:hover { opacity: .85; }
    #input-row button:disabled { opacity: .4; cursor: not-allowed; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #a044ff; animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>✦ Dnuzi AI</h1>
    <p>Powered by DanuZz &nbsp;•&nbsp; @dnuzi</p>
  </header>
  <div id="messages">
    <div class="msg ai">
      👋 Hello! I'm <strong>Dnuzi AI</strong>, your intelligent assistant powered by DanuZz.<br>Ask me anything!
      <div class="meta">Dnuzi AI • ready</div>
    </div>
  </div>
  <div id="input-row">
    <input id="input" type="text" placeholder="Ask anything…" autocomplete="off"/>
    <button id="send">Send</button>
  </div>
</div>

<script>
// ─── Dnuzi AI Browser SDK ─────────────────────────────────────────────────
const DnuziAI = (() => {
  const BASE = "https://ai.dnuz.top/api/ai";

  class Client {
    constructor({ sessionId = "default" } = {}) {
      this.sessionId      = sessionId;
      this.conversationId = null;
      this.history        = [];
    }

    async chat(message) {
      const params = new URLSearchParams({ q: message });
      if (this.conversationId) params.set("conversationId", this.conversationId);
      if (this.sessionId !== "default") params.set("sessionId", this.sessionId);

      const res  = await fetch(`${BASE}?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data.success) throw new Error("API error");

      if (data.conversationId) this.conversationId = data.conversationId;

      const ts = new Date();
      this.history.push({ role: "user",      content: message,     ts });
      this.history.push({ role: "assistant", content: data.result, ts, ms: data.responseTime });

      return data;
    }

    newConversation() { this.conversationId = null; this.history = []; }
    getHistory()      { return [...this.history]; }
  }

  return { Client };
})();

// ─── Chat UI ──────────────────────────────────────────────────────────────
const ai       = new DnuziAI.Client();
const msgs     = document.getElementById("messages");
const input    = document.getElementById("input");
const sendBtn  = document.getElementById("send");

function addMsg(role, text, ms) {
  const el  = document.createElement("div");
  el.className = `msg ${role}`;
  el.innerHTML = text.replace(/\n/g, "<br>") +
    `<div class="meta">${role === "ai" ? `Dnuzi AI • ⚡ ${ms}ms` : "You"}</div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "msg ai typing";
  el.innerHTML = "<span></span><span></span><span></span>";
  el.id = "typing";
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  sendBtn.disabled = true;

  addMsg("user", msg);
  showTyping();

  try {
    const data = await ai.chat(msg);
    removeTyping();
    addMsg("ai", data.result, data.responseTime);
  } catch (e) {
    removeTyping();
    addMsg("ai", `❌ Error: ${e.message}`);
  }
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
input.focus();
</script>
</body>
</html>
