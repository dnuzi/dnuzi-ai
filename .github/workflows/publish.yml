name: Publish to npm

on:
  push:
    tags:
      - "v*"        # triggers on v0.0.1, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  # ── 1. Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

  # ── 2. Publish ───────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to create GitHub release
      id-token:  write      # for npm provenance signing

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # Bump package.json version to match the git tag
      - name: Sync version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          echo "Syncing version to $TAG"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      # Publish with provenance so the npm page shows the GitHub Actions badge
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release automatically
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            README.md
